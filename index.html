                if (gameState !== 'AWAKE' || document.pointerLockElement !== canvas) return;
                const dx = invertX ? -e.movementX : e.movementX;
                const dy = invertY ? e.movementY : -e.movementY;
                // Keep a very wide per-event cap to avoid pathological spikes but accumulate per-frame
                const maxDelta = 120;
                const cappedDx = Math.max(-maxDelta, Math.min(maxDelta, dx));
                const cappedDy = Math.max(-maxDelta, Math.min(maxDelta, dy));
                rawMouseDX += cappedDx;
                rawMouseDY += cappedDy;
                stationaryTimer = 0; breathPlayed = false;
            });

            document.addEventListener('touchstart', (e) => {
                if (gameState !== 'AWAKE' || e.target.id === 'cough-btn') return;
                for (let t of e.changedTouches) {
                    if (t.clientX < halfW) { leftTouchId = t.identifier; leftTouchStartX = t.clientX; leftTouchStartY = t.clientY; joyBase.style.display = 'block'; joyBase.style.left = (t.clientX - 40) + 'px'; joyBase.style.top = (t.clientY - 40) + 'px'; joyStick.style.transform = `translate(-50%, -50%)`; } 
                    else { rightTouchId = t.identifier; rightTouchStartX = t.clientX; rightTouchStartY = t.clientY; }
                }
            }, { passive: false });
            document.addEventListener('touchmove', (e) => {
                if (gameState !== 'AWAKE') return; stationaryTimer = 0; breathPlayed = false;
                for (let t of e.changedTouches) {
                    if (t.identifier === leftTouchId) { let dx = t.clientX - leftTouchStartX, dy = t.clientY - leftTouchStartY; const dist = Math.min(40, Math.sqrt(dx*dx + dy*dy)), angle = Math.atan2(dy, dx); joyStick.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`; moveRight = (dx / 40) * 0.15; moveForward = -(dy / 40) * 0.15; } 
                    else if (t.identifier === rightTouchId) { targetLon -= (t.clientX - rightTouchStartX) * 0.4; targetLat -= (t.clientY - rightTouchStartY) * 0.4; targetLat = Math.max(-85, Math.min(85, targetLat)); rightTouchStartX = t.clientX; rightTouchStartY = t.clientY; }
                }
            }, { passive: false });
            const handleTouchEnd = (e) => { for (let t of e.changedTouches) { if (t.identifier === leftTouchId) { leftTouchId = null; moveForward = 0; moveRight = 0; joyBase.style.display = 'none'; } else if (t.identifier === rightTouchId) rightTouchId = null; } };
            document.addEventListener('touchend', handleTouchEnd); document.addEventListener('touchcancel', handleTouchEnd);
            
            document.addEventListener('keydown', (e) => { 
                if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;

                if (e.key.toLowerCase() === 'o') { invertX = !invertX; showEphemeralText('Invert X: ' + invertX); }
                if (e.key.toLowerCase() === 'k') { mouseSens = Math.min(1.0, mouseSens + 0.02); showEphemeralText('Mouse sens: ' + mouseSens.toFixed(3)); }
                if (e.key.toLowerCase() === 'l') { mouseSens = Math.max(0.01, mouseSens - 0.02); showEphemeralText('Mouse sens: ' + mouseSens.toFixed(3)); }
                if (e.key.toLowerCase() === 'h') { showQuickTutorial(); }

                        const isLit = currentCount >= i;
                        const dotClass = `dot ${isSpecial ? 'special' : ''} ${isLit ? 'lit' : ''}`;
                        const xPos = (i - 1) * DOT_SPACING;
                        html += `<div class="${dotClass}" style="left: ${xPos}px;"></div>`;
                    }
                    html += `</div>`;
                    PAINTINGS.forEach((item, index) => {
                        const isUnlocked = currentCount >= item.count;
                        const isFinal = index === 6;
                        const cardClass = `gallery-card ${isUnlocked ? 'unlocked' : 'locked'} ${isFinal ? 'final-card' : ''}`;
                        const xPos = (item.count - 1) * DOT_SPACING;
                        const topPos = `calc(45% + ${item.yOffset}px)`;
                        const leftPos = `calc(50vw + ${xPos}px)`;
                        const imgSrc = `${GALLERY_BASE_PATH}gallery_${String(index+1).padStart(2,'0')}.png`;
                        const caption = hoverTexts[index] || item.title;
                        const titleAttr = isUnlocked ? `title="${caption.replace(/"/g, '&quot;')}"` : '';
                        html += `
                            <div class="${cardClass}" style="left: ${leftPos}; top: ${topPos};" id="card-${index}" ${titleAttr} ${isUnlocked ? `onclick="GallerySystem.viewImage('${imgSrc}', ${index})"` : ''}>
                                ${isUnlocked 
                                            ? `<img data-src="${imgSrc}" class="gallery-img" id="img-${index}" src="" onerror="this.parentElement.innerHTML='<div style=\"color:#fff;text-align:center;padding:20px;font-size:1.2rem;\">${item.title}</div>'"><div class="hover-caption">${caption}</div>` 
                                            : `<div class="locked-q">？</div>`
                                        }
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                    overlayElement.innerHTML = html;
                    // Setup lazy loading for images inside the gallery overlay
                    setupGalleryLazyLoading();
                }

                    function setupGalleryLazyLoading() {
                        if (!overlayElement) return;
                        const scrollArea = overlayElement.querySelector('#gallery-scroll-area');
                        const imgs = overlayElement.querySelectorAll('img.gallery-img[data-src]');
                        if (!imgs || imgs.length === 0) return;
                        if (!('IntersectionObserver' in window)) {
                            imgs.forEach(img => { if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); } });
                            return;
                        }
                        const obsRoot = scrollArea || null;
                        const observer = new IntersectionObserver((entries) => {
                            entries.forEach(entry => {
                                if (entry.isIntersecting) {
                                    const img = entry.target;
                                    if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); }
                                    observer.unobserve(img);
                                }
                            });
                        }, { root: obsRoot, rootMargin: '200px' });
                        imgs.forEach(img => observer.observe(img));
                    }

                return {
                    open: function() {
                        releasePointerLockForUI();
                        initDOM(); render(); overlayElement.classList.add('active');
                        const scrollArea = document.getElementById('gallery-scroll-area');
                        if (scrollArea) scrollArea.scrollLeft = 0;
                        setTimeout(() => {
                            PAINTINGS.forEach((_, i) => {
                                const card = document.getElementById(`card-${i}`);
                                if(card) { setTimeout(() => card.classList.add('show'), i * 800); }
                            });
                        }, 1000);
                    },
                    close: function() {
                        if (!overlayElement) return;
                        PAINTINGS.forEach((_, i) => {
                            const card = document.getElementById(`card-${i}`);
                            if(card) {
                                let delay = (5 - i) * 300;
                                if (i === 6) delay = (6 * 300) + 2000;
                                setTimeout(() => card.classList.remove('show'), delay);
                            }
                        });
                        setTimeout(() => { overlayElement.classList.remove('active'); }, (6 * 300) + 2000 + 1000);
                    },
                    viewImage: function(src, index) {
                        const fullscreenImg = document.getElementById('gallery-fullscreen-img');
                        if (fullscreenImg) {
                            fullscreenImg.src = src;
                            fullscreenImg.style.boxShadow = index === 6 ? '0 0 80px rgba(255,0,0,0.4)' : '0 0 40px rgba(0,0,0,0.8)';
                            fullscreenElement.classList.add('active');
                        }
                    }
                };
            })();

            function showMemoryGallery() { GallerySystem.open(); }

        const clock = new THREE.Clock();
        let lastRaycastTime = 0;
        const RAYCAST_INTERVAL = 1000 / 15; // 15Hz gaze checks

        function updateVignetteForAcceptance() {
            const vignette = document.getElementById('vignette');
            if (!vignette) return;
            const redIntensity = (100 - acceptance) / 100;
            const blueIntensity = acceptance / 100;
            const defaultRed = 50 * redIntensity;
            const defaultBlue = 180 * blueIntensity;
            const vignAlpha = (typeof gameSettings !== 'undefined' ? (gameSettings.vignetteIntensity || 1.0) : 1.0) * 0.4;
            vignette.style.background = `
                radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(${defaultRed},0,${defaultBlue},${vignAlpha}) 80%, rgba(0,0,0,0.9) 100%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(20,0,0,0.1) 3px, rgba(0,0,0,0) 4px)
            `;
        }

        function updateAcceptanceTextMotion(dt) {
            if (gameSettings && gameSettings.comfortMode) return;
            // 平滑、有規律的文字跳動（以 sin 波驅動，避免隨機噪聲造成眼睛不適）
            if (typeof acceptanceAnim === 'undefined') acceptanceAnim = { phase: 0 };
            acceptanceAnim.phase += dt * 0.8 * Math.PI * 2; // 0.8 Hz
            const phase = acceptanceAnim.phase;
            const ampScale = Math.max(0, (100 - acceptance) / 100); // 0..1 (acceptance 低 -> 動作大)
            const maxTranslate = 3; // px (milder)
            const maxRotate = 3; // deg (milder)
            const translate = Math.sin(phase) * maxTranslate * ampScale * 0.5;
            const rotate = Math.sin(phase * 0.6) * maxRotate * ampScale * 0.5;
            const ids = ['inference-text'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                if (!el.dataset.origTransform) el.dataset.origTransform = el.style.transform || '';
                const base = el.dataset.origTransform;
                el.style.transform = `${base} translateY(${translate.toFixed(2)}px) rotate(${rotate.toFixed(2)}deg)`;
            });
        }

        function updateFlowerVisual() {
            const flower = document.getElementById('flower-symbol');
            if (!flower) return;
            const scale = 0.6 + (typeof acceptance !== 'undefined' ? (acceptance / 100) * 1.4 : 0.6);
            const opacity = 0.3 + (typeof acceptance !== 'undefined' ? (acceptance / 100) * 0.7 : 0.3);
            flower.style.transform = `scale(${scale})`;
            flower.style.opacity = opacity;
            const petals = flower.querySelectorAll('svg path');
            petals.forEach((p, i) => {
                const open = (typeof acceptance !== 'undefined') ? (acceptance / 100) : 0.5;
                const rot = (i - 2) * (10 + open * 10);
                const s = 0.6 + open * 1.4;
                p.setAttribute('transform', `rotate(${rot} 50 50) scale(${s})`);
                p.setAttribute('fill', (acceptance > 50) ? '#ff4444' : '#660000');
                p.style.opacity = Math.max(0.25, 0.5 + (acceptance - 50) / 200);
            });
        }

        function animateGame() {
            requestAnimationFrame(animateGame); const deltaTime = clock.getDelta();
            // Final-stage short-circuit: render final cough sequence separately
            if (finalCoughActive) {
                if (shakeIntensity > 0) {
                    camera.position.x += (Math.random() - 0.5) * shakeIntensity * 0.5;
                    camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.5;
                    camera.position.z += (Math.random() - 0.5) * shakeIntensity * 0.5;
                    shakeIntensity -= 0.05; if (shakeIntensity <= 0) { shakeIntensity = 0; camera.position.y = 0; }
                }
                // 更新終幕血粒子
                for (let j = finalBloodParticles.length - 1; j >= 0; j--) {
                    const sys = finalBloodParticles[j], pos = sys.mesh.geometry.attributes.position.array;
                    for (let i = 0; i < pos.length / 3; i++) {
                        if (pos[i*3+1] > -50) {
                            pos[i*3] += sys.vels[i].x; pos[i*3+1] += sys.vels[i].y; pos[i*3+2] += sys.vels[i].z; sys.vels[i].y -= 0.02;
                            let hit = false, isWall = false;
                            if (pos[i*3+1] <= -9.9) { hit = true; pos[i*3+1] = -9.9; }
                            else if (Math.abs(pos[i*3]) >= 19.8) { hit = true; pos[i*3] = Math.sign(pos[i*3]) * 19.8; isWall = true; }
                            else if (Math.abs(pos[i*3+2]) >= 19.8) { hit = true; pos[i*3+2] = Math.sign(pos[i*3+2]) * 19.8; isWall = true; }
                            if (hit) { createBloodStroke(new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2]), false, isWall); pos[i*3+1] = -100; }
                        }
                    }
                    sys.mesh.geometry.attributes.position.needsUpdate = true; sys.life--;
                    if (sys.life <= 0) { scene.remove(sys.mesh); finalBloodParticles.splice(j, 1); }
                }
                // 更新花型粒子（展開 -> 慢慢下墜）
                for (let b = finalBloomParticles.length - 1; b >= 0; b--) {
                    const bloom = finalBloomParticles[b];
                    bloom.elapsed += deltaTime;
                    const progress = Math.min(1, bloom.elapsed / 3.0);
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
                    const up = new THREE.Vector3(0, 1, 0);
                    const right = new THREE.Vector3().crossVectors(forward, up).normalize();
                    const spreadVec = new THREE.Vector3().addScaledVector(right, Math.cos(bloom.theta)).addScaledVector(up, Math.sin(bloom.theta)).normalize();
                    const posAttr = bloom.mesh.geometry.attributes.position;
                    const posArr = posAttr.array;
                    const segs = bloom.segs;
                    const radialBase = bloom.length * (1 - Math.pow(1 - progress, 3));
                    for (let s = 0; s < segs; s++) {
                        const f = s / (segs - 1);
                        const outward = radialBase * f;
                        const lateral = bloom.amp * Math.sin(f * Math.PI) * radialBase * (0.6 + 0.4 * progress);
                        const p = new THREE.Vector3().copy(bloom.spawnPos).add(forward.clone().multiplyScalar(outward)).add(spreadVec.clone().multiplyScalar(lateral));
                        p.y += bloom.dropOffset || 0;
                        posArr[s*3] = p.x; posArr[s*3+1] = p.y; posArr[s*3+2] = p.z;
                    }
                    posAttr.needsUpdate = true;
                    if (bloom.mesh && bloom.mesh.material && bloom.mesh.material.color) bloom.mesh.material.color.lerp(new THREE.Color(0xff3b3b), progress * 0.9);
                    if (bloom.elapsed > 3.0) { bloom.vy = (bloom.vy || 0) - 0.4 * deltaTime; bloom.dropOffset = (bloom.dropOffset || 0) + (bloom.vy) * deltaTime; }
                    bloom.life -= deltaTime;
                    if (bloom.life <= 0) { if (bloom.mesh) scene.remove(bloom.mesh); finalBloomParticles.splice(b, 1); }
                }
                // 固定視角
                phi = THREE.MathUtils.degToRad(90 - lat); theta = THREE.MathUtils.degToRad(lon);
                const target = new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
                resolvePlayerColliderOverlap();
                camera.lookAt(target.add(camera.position)); updateCorridorVisibility();
                try { updateFlowerVisual(); } catch(e) {}
                renderer.render(scene, camera); return;
            }
            // 若 dreamPhase 正在進行，減少輸入與顯示（簡單實作）
            if (dreamPhase) {
                // 夢境期間暫停主要互動，10 秒後結束
                // 這裡僅示意：若需要更完整的 dreamSceneGroup，可再擴充
            }

            if (gameState === 'AWAKE' || gameState === 'SLEEPING' || gameState === 'ENDING' || gameState === 'COLLAPSE') {
                if (weaknessTimer > 0) weaknessTimer -= deltaTime;
                // Consume accumulated mouse movement each frame for consistent smoothing
                if (typeof rawMouseDX !== 'undefined') {
                    const dx = rawMouseDX, dy = rawMouseDY;
                    rawMouseDX = 0; rawMouseDY = 0;
                    targetLon += dx * mouseSens;
                    targetLat += dy * mouseSens;
                    targetLat = Math.max(-85, Math.min(85, targetLat));
                }
                
                // 更接近 FPS 的直接旋轉感：當正常 Awake 時使用高 lerp（近即時反應）
                const baseLerp = (weaknessTimer > 0 || isCollapsing) ? 0.02 : 0.98;
                // 若玩家正在凝視特定物件，減少慣性（更直接）
                const isGazing = (gameState === 'AWAKE' && typeof currentGazedObject !== 'undefined' && currentGazedObject !== null);
                const effectiveLerp = isGazing ? 1.0 : baseLerp;
                // 平滑套用角度差，避免穿越 360° 導致瞬間翻轉
                const diffLon = ((targetLon - lon + 540) % 360) - 180; // range [-180,180)
                const applied = diffLon * effectiveLerp;
                const maxStep = 60; // degrees per frame cap (increased to avoid per-frame clipping)
                const step = Math.max(-maxStep, Math.min(maxStep, applied));
                lon += step;
                // 對俯仰角也加入每幀上限，避免垂直方向的大跳動
                const latDiff = (targetLat - lat) * effectiveLerp;
                const maxLatStep = 30; // larger vertical cap to avoid vertical stutter
                const latStep = Math.max(-maxLatStep, Math.min(maxLatStep, latDiff));
                lat += latStep;
                phi = THREE.MathUtils.degToRad(90 - lat); theta = THREE.MathUtils.degToRad(lon);
                const target = new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
                
                if (gameState === 'AWAKE') {
                    let cFwd = moveForward, cRgt = moveRight;
                    const baseSpeed = 0.15 * (gameSettings.moveSpeedScale || 1.0);
                    if (keys.w) cFwd = baseSpeed; if (keys.s) cFwd = -baseSpeed; if (keys.a) cRgt = -baseSpeed; if (keys.d) cRgt = baseSpeed;
                    if (weaknessTimer > 0) { cFwd *= 0.5; cRgt *= 0.5; }
                    
                    if (cFwd !== 0 || cRgt !== 0) { 
                        stationaryTimer = 0; breathPlayed = false;
                        const forward = new THREE.Vector3(target.x, 0, target.z).normalize();
                        const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward).normalize();
                        const step = forward.multiplyScalar(cFwd).add(right.multiplyScalar(-cRgt));
                        let nextX = camera.position.x + step.x;
                        let nextZ = camera.position.z + step.z;

                        // 支援沿邊滑動：先嘗試完整位移，失敗再拆軸
                        if (!isPositionBlocked(nextX, nextZ)) {
                            camera.position.x = nextX;
                            camera.position.z = nextZ;
                        } else {
                            if (!isPositionBlocked(nextX, camera.position.z)) camera.position.x = nextX;
                            if (!isPositionBlocked(camera.position.x, nextZ)) camera.position.z = nextZ;
                        }

                        const bound = 18;
                        camera.position.x = Math.max(-bound, Math.min(bound, camera.position.x));
                        camera.position.z = Math.max(-bound, Math.min(bound, camera.position.z));
                    } else {
                        stationaryTimer += deltaTime;
                        if(stationaryTimer > 15.0 && !breathPlayed) { AudioEngine.playBreath(); breathPlayed = true; }
                        if(stationaryTimer > 30.0) { unlockPoemFragment('P25'); }
                    }

                    // Throttle raycast-based gaze checks to reduce CPU: run ~15Hz
                    const nowMs = performance.now();
                    if (nowMs - lastRaycastTime >= RAYCAST_INTERVAL) {
                        // divide by 4000 (i.e. /1000 then /4) so the effective dt passed
                        // to checkInteractions approximates a single-frame dt
                        const realDt = (nowMs - lastRaycastTime) / 3000;  // 除以 4
                        checkInteractions(realDt);
                        lastRaycastTime = nowMs;
                    }
                    updateAnReaction();
                    
                    if(playerCognition.activeDelusions.length > 0 && Math.random() < 0.002) { 
                        const fh=document.getElementById('fake-hint'); 
                        fh.innerText = Math.random() > 0.5 ? "茶收到了嗎？" : "快了，再一下。"; 
                        fh.style.opacity='1'; 
                        document.getElementById('canvas-container').classList.add('fake-flash');
                        setTimeout(() => { 
                            fh.style.opacity='0'; 
                            document.getElementById('canvas-container').classList.remove('fake-flash');
                        }, 2000); 
                    }
                }

                if (gameState === 'COLLAPSE') {
                    collapseTimer -= deltaTime;
                    roomLines.forEach((l, idx) => {
                        if(!l) return; const pos = l.geometry.attributes.position.array; const orig = roomOrigVerts[idx];
                        for(let i=0; i<pos.length; i+=3){ pos[i]=orig[i]+Math.sin(Date.now()*0.005 + pos[i+1])*0.5; pos[i+1]=orig[i+1]+Math.cos(Date.now()*0.004)*0.2; pos[i+2]=orig[i+2]+Math.sin(Date.now()*0.006)*0.5; }
                        l.geometry.attributes.position.needsUpdate = true; l.material.color.setHex(0xffaaaa);
                    });
                    if (collapseTimer <= 0) {
                        isCollapsing = false; gameState = 'AWAKE'; 
                        
                        // 新增：崩壞結束的喘息引導
                        AudioEngine.startHeartbeat(1.2); setTimeout(()=>AudioEngine.stopHeartbeat(), 1500);
                        
                        document.getElementById('ui-layer').style.display='flex'; document.getElementById('reticle').style.display='block';
                        const dh = document.getElementById('desktop-hint');
                        dh.innerHTML = '<span style="color:#ff4444; text-shadow: 0 0 5px red; font-size: 1.1rem; letter-spacing: 2px;">它聽見妳了。繼續嗎？</span>';
                        setTimeout(() => { dh.innerHTML = "空白鍵 / 按鈕 咳嗽<br>WASD 行走 / 點擊畫面鎖定視角 / 凝視異常進行推論 / H 再看教學"; dh.style.color = "rgba(255,255,255,0.3)"; }, 3000);
                        
                        roomLines.forEach((l, idx) => { if(l){ l.material.color.setHex(0xffffff); const pos=l.geometry.attributes.position.array; const orig=roomOrigVerts[idx]; for(let i=0;i<pos.length;i++){ pos[i]=orig[i]+(Math.random()-0.5)*0.2; } l.geometry.attributes.position.needsUpdate=true; } });
                        updateMusicForState();
                        unlockPoemFragment('P08');
                    }
                }

                camera.lookAt(target.add(camera.position));
                resolvePlayerColliderOverlap();
                updateCorridorVisibility();
                if(playerShadow) { playerShadow.position.x = camera.position.x; playerShadow.position.z = camera.position.z; }
                if (shakeIntensity > 0) { camera.position.x += (Math.random()-0.5)*shakeIntensity; camera.position.y += (Math.random()-0.5)*shakeIntensity; camera.position.z += (Math.random()-0.5)*shakeIntensity; shakeIntensity -= 0.05; if (shakeIntensity <= 0) { shakeIntensity = 0; camera.position.y = 0; } }

                for (let j = activeBlood.length - 1; j >= 0; j--) {
                    const sys = activeBlood[j], pos = sys.mesh.geometry.attributes.position.array; let active = false;
                    for (let i = 0; i < pos.length / 3; i++) {
                        if (pos[i*3+1] > -50) {
                            active = true; pos[i*3] += sys.vels[i].x; pos[i*3+1] += sys.vels[i].y; pos[i*3+2] += sys.vels[i].z; sys.vels[i].y -= 0.015;
                            let hit = false, isWall = false;
                            if (pos[i*3+1] <= -9.9) { hit = true; pos[i*3+1] = -9.9; } else if (Math.abs(pos[i*3]) >= 19.8) { hit = true; pos[i*3] = Math.sign(pos[i*3])*19.8; isWall = true; } else if (Math.abs(pos[i*3+2]) >= 19.8) { hit = true; pos[i*3+2] = Math.sign(pos[i*3+2])*19.8; isWall = true; }
                            if (hit) { createBloodStroke(new THREE.Vector3(pos[i*3], pos[i*3+1], pos[i*3+2]), false, isWall); pos[i*3+1] = -100; }
                        }
                    }
                    sys.mesh.geometry.attributes.position.needsUpdate = true; sys.life--;
                    if(sys.life <= 0) { scene.remove(sys.mesh); activeBlood.splice(j, 1); }
                }
                updateVignetteForAcceptance();
                updateAcceptanceTextMotion(deltaTime);
                if (devPanel) updateDevPanel();
                try { updateFlowerVisual(); } catch(e) {}
                renderer.render(scene, camera);
            }
        }
    </script>
