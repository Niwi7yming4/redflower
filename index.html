<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>最美麗的紅花 - 紅色劇場</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; touch-action: none; font-family: "MingLiU", "PMingLiU", "Courier New", serif; user-select: none; -webkit-user-select: none; }
        canvas { cursor: none; } /* 隱藏畫布上的預設游標 */

        /* --- 開場畫面 --- */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 2.5s ease-out, visibility 2.5s; cursor: pointer; }
        .noise-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.04" fill="%23fff"/%3E%3C/svg%3E'); opacity: 0.5; animation: grain 8s steps(10) infinite; pointer-events: none; }
        @keyframes grain { 0%,100%{transform:translate(0,0);} 10%{transform:translate(-5%,-5%);} 30%{transform:translate(3%,4%);} 50%{transform:translate(-2%,6%);} 70%{transform:translate(5%,-3%);} 90%{transform:translate(-3%,0%);} }
        #envelope-canvas { width: min(80vw, 400px); height: min(50vh, 250px); display: block; z-index: 10; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
        #typewriter-container { margin-top: 30px; min-height: 120px; width: 80%; max-width: 600px; text-align: center; z-index: 15; font-family: "Times New Roman", serif; pointer-events: none; }
        #typewriter-text { color: rgba(255, 255, 255, 0.7); font-size: 1.1rem; letter-spacing: 3px; line-height: 2.0; display: inline; white-space: pre-wrap; text-shadow: 0 0 8px rgba(255,255,255,0.2); }
        #typewriter-cursor { display: inline-block; width: 2px; margin-left: 2px; color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .intro-hint { position: absolute; bottom: 8%; color: rgba(255, 255, 255, 0.25); font-size: 0.8rem; letter-spacing: 6px; text-transform: uppercase; animation: breathe 4s ease-in-out infinite; z-index: 15; opacity: 0; transition: opacity 1s; }
        @keyframes breathe { 0%,100%{opacity:0.15;} 50%{opacity:0.5;} }

        /* --- 遊戲主渲染與 UI --- */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: opacity 2s; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(50,0,0,0.4) 80%, rgba(0,0,0,0.9) 100%), repeating-linear-gradient(45deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(20,0,0,0.1) 3px, rgba(0,0,0,0) 4px); pointer-events: none; transition: background 0.1s ease-out, opacity 0.5s; z-index: 5; opacity: 0.8; }
        
        #ui-layer { position: absolute; bottom: 5%; width: 100%; display: none; justify-content: center; z-index: 10; pointer-events: none; }
        #cough-btn { pointer-events: auto; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.4); color: rgba(255, 255, 255, 0.7); padding: 15px 40px; font-size: 1.2rem; border-radius: 5px; letter-spacing: 8px; cursor: pointer; transition: all 0.1s; backdrop-filter: blur(2px); }
        #cough-btn:active { background: rgba(180, 0, 0, 0.3); border-color: #ff2222; color: #ff2222; transform: scale(0.95); }
        
        #reticle { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; transition: all 0.2s; display: none; }
        /* 新增：常駐準星的呼吸動畫 */
        .reticle-steady {
            display: block !important;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: breathe-reticle 4s ease-in-out infinite;
        }
        @keyframes breathe-reticle {
            0%,100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
        }
        #gaze-progress { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; border: 2px solid transparent; border-top-color: #ff0000; border-radius: 50%; transform: translate(-50%, -50%) rotate(0deg); z-index: 9; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        
        #interaction-hint { position: absolute; top: 55%; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.8); font-size: 1.05rem; letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; z-index: 10; pointer-events: none; text-shadow: 0 0 5px #000; }
        #inference-text { position: absolute; top: 60%; width: 100%; text-align: center; color: rgba(200, 50, 50, 0.9); font-size: 1.15rem; letter-spacing: 3px; opacity: 0; transition: opacity 0.5s; z-index: 10; pointer-events: none; font-style: italic; }
        
        /* 紅色劇場打臉文字 */
        #reckoning-text { position: absolute; top: 70%; width: 100%; text-align: center; color: #ff0000; font-size: 1.5rem; letter-spacing: 10px; opacity: 0; transition: opacity 0.2s; z-index: 160; pointer-events: none; font-weight: bold; text-shadow: 0 0 15px rgba(255,0,0,0.8); font-family: "MingLiU", serif; }

        .desktop-hint { position: absolute; top: 5%; left: 5%; color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.95rem; z-index: 10; display: none; transition: all 0.3s;}
        #tutorial-card { position: absolute; right: 4%; top: 7%; max-width: min(430px, 80vw); background: linear-gradient(180deg, rgba(20,0,0,0.84), rgba(0,0,0,0.75)); border: 1px solid rgba(255,90,90,0.45); box-shadow: 0 0 25px rgba(255,0,0,0.15); color: rgba(255,235,235,0.95); z-index: 25; padding: 14px 18px; letter-spacing: 1px; line-height: 1.65; font-size: 1rem; opacity: 0; transform: translateY(-8px); pointer-events: none; transition: opacity 0.6s ease, transform 0.6s ease; }
        #tutorial-card.show { opacity: 1; transform: translateY(0); }
        #settings-btn { position: absolute; right: 4%; top: 4%; z-index: 35; background: rgba(20,0,0,0.75); color: #ffdede; border: 1px solid rgba(255,120,120,0.55); padding: 8px 14px; letter-spacing: 2px; cursor: pointer; font-family: inherit; display: none; }
        #settings-panel { position: fixed; right: 4%; top: 10%; width: min(360px, 88vw); background: rgba(0,0,0,0.9); border: 1px solid rgba(255,110,110,0.55); box-shadow: 0 0 24px rgba(255,0,0,0.18); z-index: 10020; padding: 16px; display: none; }
        #settings-panel h3 { margin: 0 0 12px 0; color: #ffdede; font-size: 1.1rem; letter-spacing: 3px; }
        .setting-row { margin: 10px 0 12px; color: #ffdede; font-size: 0.95rem; }
        .setting-row label { display: block; margin-bottom: 6px; }
        .setting-row input[type="range"] { width: 100%; accent-color: #ff5555; }
        .setting-row .val { color: #ffaaaa; margin-left: 6px; }
        #settings-close { margin-top: 8px; width: 100%; background: #220000; color: #ffdddd; border: 1px solid #ff6666; padding: 8px 10px; cursor: pointer; }
        #joystick-base { position: absolute; bottom: 15%; left: 10%; width: 80px; height: 80px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; z-index: 8; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); }

        /* --- 讀信模式 --- */
        #letter-reading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 150; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 1s; cursor: pointer; }
        #letter-reading-text { color: #fff; font-size: 1.1rem; line-height: 2.2; letter-spacing: 4px; max-width: 80%; text-shadow: 0 0 10px rgba(255,255,255,0.3); text-align: left; white-space: pre-wrap; display: inline; }
        .close-hint { margin-top: 50px; color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 4px; opacity: 0; transition: opacity 1s;}

        /* --- 結局與夜間 --- */
        #night-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 50; display: none; opacity: 0; transition: opacity 1.5s; flex-direction: column; align-items: center; pointer-events: none; }
        #day-title { position: absolute; top: 20%; color: #FFFFFF; font-family: "Times New Roman", serif; font-size: 1.8rem; letter-spacing: 5px; z-index: 52; }
        #sleep-progress-container { position: absolute; bottom: 10%; width: 80%; height: 2px; background: rgba(255,255,255,0.1); z-index: 52; }
        #sleep-progress-bar { width: 0%; height: 100%; background: #880000; box-shadow: 0 0 5px #ff0000; transition: width 6s linear; }
        #wake-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(0,0,0,0.55) 72%, rgba(0,0,0,0.85) 100%); z-index: 60; opacity: 0; pointer-events: none; display: none; }
        
        #ending-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 3s; pointer-events: auto;}
        #ending-text { color: #fff; font-size: 1.1rem; line-height: 2.5; letter-spacing: 5px; max-width: 80%; text-align: left; white-space: pre-wrap; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        
        /* 假回饋與碎片化提示 UI */
        #fake-hint { position: absolute; top: 30%; width: 100%; text-align: center; color: rgba(255,255,255,0.8); font-size: 1.2rem; letter-spacing: 6px; z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.5s; font-style: italic; text-shadow: 0 0 8px rgba(255,0,0,0.6); }
        #ephemeral-text { position: absolute; bottom: 15%; right: 10%; color: #ff0000; font-size: 0.9rem; letter-spacing: 2px; opacity: 0; transition: opacity 0.5s; z-index: 150; pointer-events: none; }

        /* 咳嗽字幕位置：移至畫面中央準星上方一點（相對於準星） */
        #cough-sub { position: fixed; left: 50%; top: 46%; transform: translate(-50%, -120%); color: #ff4444; font-size: 1rem; letter-spacing: 1px; opacity: 0; transition: opacity 0.25s ease, transform 0.12s; z-index: 10060; pointer-events: none; text-shadow: 0 0 8px rgba(255,0,0,0.55); background: rgba(0,0,0,0.25); padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,80,80,0.12); font-weight: 600; will-change: transform; }
        @keyframes coughGlitch {
            0% { transform: translate(0,0) scale(1); }
            25% { transform: translate(-2px, -1px) scale(1.02); }
            50% { transform: translate(1px, 1px) scale(0.995); }
            75% { transform: translate(-1px, 2px) scale(1.01); }
            100% { transform: translate(0,0) scale(1); }
        }
        .cough-glitch { animation: coughGlitch 0.12s ease-in-out 4; }
        
        /* 碎片進度計數器 - 常駐但低透明度 */
        #fragment-counter { position: absolute; bottom: 5%; left: 5%; color: #cc4444; font-size: 0.8rem; letter-spacing: 2px; opacity: 0.3; transition: opacity 0.5s; z-index: 10; pointer-events: none; font-family: monospace; text-shadow: 0 0 5px rgba(255,0,0,0.3); }

        /* 針對動態浮層確保不會攔截滑鼠事件（以防遺漏） */
        #cough-sub, #fake-hint, #ephemeral-text, #reckoning-text, #interaction-hint, #fragment-counter, #diegetic-note, #chromatic-layer { pointer-events: none; }

        /* diegetic note (in-world sticky note rendered in screen space) */
        #diegetic-note {
            position: fixed;
            bottom: 12%;
            left: 12%;
            background: rgba(255, 248, 220, 0.08);
            color: rgba(255, 220, 180, 0.9);
            font-family: "Kaiti", "MingLiU", serif;
            font-size: 1rem;
            letter-spacing: 2px;
            line-height: 1.8;
            padding: 12px 16px;
            border-left: 2px solid rgba(180, 100, 80, 0.4);
            text-shadow: 0 0 8px rgba(255,100,50,0.3);
            backdrop-filter: blur(1px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: rotate(-1deg);
            z-index: 30;
        }
        #diegetic-note.visible { opacity: 1; transform: rotate(0deg); }

        /* chromatic aberration layer for gaze intensity */
        #chromatic-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 6;
            mix-blend-mode: screen;
            background: transparent;
            transition: box-shadow 0.3s ease;
        }

        /* fragment counter whisper state */
        #fragment-counter.whisper {
            opacity: 0.85;
            transform: translateY(0px);
            transition: opacity 1.2s ease, transform 1.5s ease;
        }
        
        .ghost-room-effect { filter: contrast(1.5) drop-shadow(0 0 10px rgba(255,0,0,0.3)); animation: glitch-anim 0.2s 5; }
        .fake-flash { animation: inset-red-flash 0.8s ease-out; }

        /* 睡前進度提示文字 */
        #sleep-hint { position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%); color: rgba(180,30,30,0.95); font-size: 1rem; opacity: 0; transition: opacity 0.4s ease; z-index: 170; pointer-events: none; font-weight: 600; letter-spacing: 2px; }
        
        @keyframes glitch-anim { 0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) } 40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) } 80% { transform: translate(2px, -2px) } 100% { transform: translate(0) } }
        @keyframes inset-red-flash { 0% { box-shadow: inset 0 0 80px rgba(255,0,0,0.5); background-color: rgba(255,255,255,0.05); } 100% { box-shadow: inset 0 0 0 rgba(255,0,0,0); background-color: transparent; } }
        #flower-symbol {
            position: fixed;
            bottom: 10%;
            right: 8%;
            z-index: 20;
            pointer-events: none;
            transition: all 0.5s ease;
            opacity: 0.9;
        }

        #flower-symbol svg path { transition: transform 0.3s ease, fill 0.3s ease; transform-origin: 50% 50%; }
        </style>

    <style>
    /* =========================================
       記憶長廊 核心空間 (1920x1080 橫幅圖片版)
    ========================================= */
    #gallery-overlay {
        position: fixed; left: 0; top: 0; width: 100%; height: 100%;
        background-color: #000;
        z-index: 10000; display: flex; flex-direction: column;
        opacity: 0; pointer-events: none; transition: opacity 2s ease-in-out;
    }
    #gallery-overlay.active {
        opacity: 1; pointer-events: auto;
    }

    .gallery-close-btn {
        position: fixed; right: 40px; top: 40px; padding: 10px 20px;
        background: transparent; color: rgba(255,255,255,0.3); border: none;
        cursor: pointer; font-family: inherit; font-size: 14px; letter-spacing: 6px;
        transition: 0.5s; z-index: 100;
    }
    .gallery-close-btn:hover {
        color: #ffaaaa; text-shadow: 0 0 10px rgba(255,0,0,0.8);
    }

    #gallery-scroll-area {
        position: absolute; left: 0; top: 0; width: 100%; height: 100%;
        overflow-x: auto; overflow-y: hidden; cursor: grab;
        scroll-behavior: smooth; display: flex; align-items: center;
    }
    #gallery-scroll-area:active { cursor: grabbing; }
    #gallery-scroll-area::-webkit-scrollbar { display: none; }
    #gallery-scroll-area { -ms-overflow-style: none; scrollbar-width: none; }

    .corridor-bridge {
        position: relative; height: 100%;
    }

    /* 進度線 */
    .progress-line {
        position: absolute; top: 75%;
        left: 50vw;
        height: 1px; background: rgba(255,255,255,0.1);
        z-index: 1;
    }
    .dot {
        position: absolute; top: -2px; width: 5px; height: 5px;
        border-radius: 50%; background: rgba(255,255,255,0.1);
        transition: background 1s ease, box-shadow 1s ease;
    }
    .dot.special { background: rgba(100,0,0,0.3); }
    .dot.lit { background: rgba(255,255,255,0.6); box-shadow: 0 0 5px rgba(255,255,255,0.3); }
    .dot.special.lit { background: #ff5555; box-shadow: 0 0 10px rgba(255,0,0,0.8); }

    /* 畫作卡牌 (橫式寬幅) */
    .gallery-card {
        position: absolute;
        width: 640px;   /* 16:9 基礎尺寸 */
        height: 360px;
        transform: translateX(-50%);
        display: flex; justify-content: center; align-items: center;
        opacity: 0;
        transition: opacity 1.5s ease, box-shadow 0.8s ease;
        cursor: default;
    }
    
    .gallery-card.show { opacity: 1; }

    .gallery-card.locked {
        border: 1px solid rgba(255,255,255,0.02);
        box-shadow: 0 0 10px rgba(255,255,255,0.01);
    }
    .locked-q {
        font-size: 4rem; color: rgba(255,255,255,0.05);
        text-shadow: 0 0 5px rgba(255,255,255,0.02);
    }

    .gallery-card.unlocked {
        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 0 15px rgba(255,0,0,0.1); cursor: pointer;
    }
    .gallery-img {
        width: 100%; height: 100%; object-fit: contain;  /* 完整顯示，不裁切 */
        opacity: 0.85; transition: opacity 0.5s;
    }

    .gallery-card.unlocked:hover {
        box-shadow: 0 0 25px rgba(255,0,0,0.25); border-color: rgba(255,255,255,0.5);
    }
    .gallery-card.unlocked:hover .gallery-img { opacity: 1; }
    .hover-caption {
        position: absolute;
        left: 50%;
        bottom: -54px;
        transform: translate(-50%, 8px);
        width: min(86%, 520px);
        color: #ffaaaa;
        font-size: 14px;
        letter-spacing: 1px;
        line-height: 1.45;
        text-align: center;
        white-space: normal;
        word-break: break-word;
        opacity: 0;
        transition: opacity 0.6s ease, transform 0.6s ease;
        pointer-events: none;
        text-shadow: 0 0 8px rgba(255,0,0,0.5);
    }
    .gallery-card.unlocked:hover .hover-caption {
        opacity: 1;
        transform: translate(-50%, -2px);
    }

    /* 第七幅畫的特權 (大尺寸 + 紅光) */
    .gallery-card.final-card {
        width: 768px;
        height: 432px;
    }
    .gallery-card.final-card.unlocked {
        border: 1px solid rgba(255,50,50,0.4);
        box-shadow: 0 0 40px rgba(255,0,0,0.6), inset 0 0 10px rgba(255,0,0,0.2);
    }
    .gallery-card.final-card.unlocked:hover {
        box-shadow: 0 0 60px rgba(255,0,0,0.8), inset 0 0 20px rgba(255,0,0,0.4);
    }

    /* 全螢幕檢視 (原比例顯示) */
    #gallery-fullscreen {
        position: fixed; left: 0; top: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.98); z-index: 10005; display: flex;
        align-items: center; justify-content: center; opacity: 0; pointer-events: none;
        transition: opacity 0.6s ease; cursor: zoom-out;
    }
    #gallery-fullscreen.active { opacity: 1; pointer-events: auto; }
    #gallery-fullscreen img {
        max-width: 95%; max-height: 95%; object-fit: contain;
    }
    </style>
</head>
<body>
    <noscript>最美麗的紅花，是妳不相信自己正在開的那一朵。</noscript>

    <div id="intro-screen">
        <div class="noise-bg"></div><canvas id="envelope-canvas"></canvas>
        <div id="typewriter-container"><div id="typewriter-text"></div><div id="typewriter-cursor">_</div></div>
        <div class="intro-hint" id="intro-hint">點擊信封 睜開雙眼</div>
    </div>

    <div id="canvas-container"></div>
    <div id="vignette"></div>
    <div class="desktop-hint" id="desktop-hint">空白鍵 / 按鈕 咳嗽<br>WASD 行走 / 點擊畫面鎖定視角 / 凝視異常進行推論 / H 再看教學</div>
    <button id="settings-btn">設定 (M)</button>
    <div id="settings-panel"></div>
    <div id="joystick-base"><div id="joystick-stick"></div></div>
    
    <div id="reticle"></div>
    <div id="gaze-progress"></div>
    <div id="interaction-hint"></div>
    <div id="inference-text"></div>
    
    <div id="reckoning-text">妳在騙自己。</div>
    
    <div id="fake-hint"></div>
    <div id="ephemeral-text"></div>
    <div id="cough-sub"></div>
    <!-- 碎片進度初始化 -->
    <div id="fragment-counter">&lt;記憶碎片：0/26&gt;</div>
    <div id="diegetic-note" aria-hidden="true"></div>
    <div id="chromatic-layer" aria-hidden="true"></div>

    <div id="ui-layer"><button id="cough-btn">咳 嗽</button></div>

    <div id="letter-reading-screen">
        <div><div id="letter-reading-text"></div><div id="typewriter-cursor" style="display:inline-block">_</div></div>
        <div class="close-hint" id="letter-close-hint">點擊放下信件</div>
    </div>

    <div id="night-screen">
        <div class="noise-bg" style="z-index: 51"></div>
        <div id="day-title">Day 1</div>
        <div id="sleep-progress-container"><div id="sleep-progress-bar"></div></div>
    </div>
    <div id="sleep-hint"></div>
    <div id="wake-flash"></div>
    
    <div id="ending-screen"><div id="ending-text"></div></div>
    <div id="flower-symbol">
        <svg viewBox="0 0 100 100" width="60" height="60" aria-hidden="true">
            <g id="flower-petals">
                <path d="M50,50 L50,20 Q40,30 50,50" fill="#ff4444" opacity="0.9" transform="translate(0,0)" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const SOUND_BUFFER_DURATION = 0.2;
        const AudioEngine = {
            ctx: null, heartbeatOsc: null, heartbeatGain: null, droneOsc: null, droneGain: null,
            sfxVolume: 1.0,
            init: function() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); },
            playScrape: function() { 
                if(!this.ctx) return; const bufferSize = this.ctx.sampleRate * 0.2; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 3000 + Math.random() * 2000; filter.Q.value = 5;
                const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0.3 * this.sfxVolume, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); noise.start();
            },
            playPaper: function() { 
                if(!this.ctx) return; const bufferSize = this.ctx.sampleRate * 0.4; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
                const noise = this.ctx.createBufferSource(); noise.buffer = buffer; const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
                const gain = this.ctx.createGain(); gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.2 * this.sfxVolume, this.ctx.currentTime + 0.1); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); noise.start();
            },
            startHeartbeat: function(intensity = 1.0) { 
                if(!this.ctx) return; if(this.heartbeatOsc) this.stopHeartbeat();
                this.heartbeatOsc = this.ctx.createOscillator(); this.heartbeatOsc.type = 'sine'; this.heartbeatOsc.frequency.value = 40;
                this.heartbeatGain = this.ctx.createGain(); this.heartbeatGain.gain.value = 0.5 * intensity * this.sfxVolume;
                const lfo = this.ctx.createOscillator(); lfo.type = 'square'; lfo.frequency.value = 1.2 * intensity; 
                const lfoGain = this.ctx.createGain(); lfoGain.gain.value = 0.5; lfo.connect(lfoGain); lfoGain.connect(this.heartbeatGain.gain);
                this.heartbeatOsc.connect(this.heartbeatGain); this.heartbeatGain.connect(this.ctx.destination);
                this.heartbeatOsc.start(); lfo.start();
            },
            stopHeartbeat: function() {
                if(this.heartbeatGain) { this.heartbeatGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1); setTimeout(() => { if(this.heartbeatOsc){ this.heartbeatOsc.stop(); this.heartbeatOsc = null; } }, 1000); }
            },
            startDrone: function() {
                if(!this.ctx || this.droneOsc) return;
                this.droneOsc = this.ctx.createOscillator(); this.droneOsc.type = 'triangle'; this.droneOsc.frequency.value = 55;
                this.droneGain = this.ctx.createGain(); this.droneGain.gain.setValueAtTime(0, this.ctx.currentTime); this.droneGain.gain.linearRampToValueAtTime(0.1 * this.sfxVolume, this.ctx.currentTime + 5);
                this.droneOsc.connect(this.droneGain); this.droneGain.connect(this.ctx.destination); this.droneOsc.start();
            },
            playChoke: function() { 
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.5);
                gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.5 * this.sfxVolume, this.ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.6);
            },
            playFakeKnock: function() { 
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(80, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.8 * this.sfxVolume, this.ctx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playTapeWobble: function() { 
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(200, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(150, this.ctx.currentTime + 0.1); osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.2 * this.sfxVolume, this.ctx.currentTime + 0.1); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            },
            playBreath: function() { 
                if(!this.ctx) return;
                const noise = this.ctx.createBufferSource();
                const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 2.0, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i=0; i<buffer.length; i++) data[i] = (Math.random()*2-1)*0.2;
                noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass';
                filter.frequency.setValueAtTime(400, this.ctx.currentTime);
                filter.frequency.linearRampToValueAtTime(800, this.ctx.currentTime + 1.0);
                filter.frequency.linearRampToValueAtTime(400, this.ctx.currentTime + 2.0);
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.6 * this.sfxVolume, this.ctx.currentTime + 1.0);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.0);
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
                noise.start();
            },
            // 人聲咳嗽（合成模擬，非真實錄音）
            playHumanCough: function(intensity = 0.5) {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const duration = 0.3 + intensity * 0.4;
                
                // 濁音部分（喉音）
                const osc1 = this.ctx.createOscillator();
                const gain1 = this.ctx.createGain();
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(150, now);
                osc1.frequency.exponentialRampToValueAtTime(60, now + duration * 0.7);
                gain1.gain.setValueAtTime(0, now);
                gain1.gain.linearRampToValueAtTime(0.4 * intensity * this.sfxVolume, now + 0.05);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
                
                // 氣音部分
                const osc2 = this.ctx.createOscillator();
                const gain2 = this.ctx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(300, now);
                osc2.frequency.exponentialRampToValueAtTime(100, now + duration);
                gain2.gain.setValueAtTime(0.1 * intensity * this.sfxVolume, now + 0.02);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.6);
                
                // 噪音（噴氣）
                const bufferSize = Math.floor(this.ctx.sampleRate * duration);
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.3 * intensity * this.sfxVolume, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

                // 加入低通濾波模擬痰音質感
                const lowpass = this.ctx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 700 + Math.random() * 300;
                lowpass.Q.value = 1.5;

                osc1.connect(gain1).connect(this.ctx.destination);
                osc2.connect(gain2).connect(this.ctx.destination);
                noise.connect(lowpass); lowpass.connect(noiseGain); noiseGain.connect(this.ctx.destination);

                osc1.start(now); osc1.stop(now + duration);
                osc2.start(now); osc2.stop(now + duration);
                noise.start(now); noise.stop(now + duration);
            },
            playGentleTone: function() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.2 * this.sfxVolume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 1.5);
            }
        };

        /* =========================================
           D. 背景音樂引擎 (溫暖合成音樂)
           完全以 Web Audio API 合成，無須外部音檔
           ========================================= */
        const MusicEngine = {
            ctx: null,
            pendingTimers: [],
            masterGain: null,
            currentTrack: null,
            currentVariation: 0,
            isPlaying: false,
            timer: null,
            notes: [],
            baseVolume: 0.5,
            // one-shot flag for playing the prime theme only once at reconciliation ending
            playedPrime: false,

            // 音符頻率對照表 (A4 = 440Hz)
            freq: {
                'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
                'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,
                'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00
            },

            // 三首主旋律及母題（每首包含多種變體）
            tracks: {
                prime: {
                    name: "母題（安真正想說的話）",
                    variations: [
                        { tempo: 0.95, octaveShift: 0, waveform: 'triangle', gain: 0.15,
                            notes: [ ['C4',3], ['E4',3], ['G4',3], ['C5',6], ['A4',4], ['G4',2], ['E4',4], ['D4',3], ['E4',3], ['C4',8] ]
                        }
                    ]
                },
                an: {
                    name: "安的主題（我以為我懂妳）",
                    variations: [
                        { tempo: 0.85, octaveShift: 0, waveform: 'triangle', gain: 0.25,
                            notes: [ ['C4',4], ['F4',4], ['A4',4], ['D5',6], ['A4',4], ['G4',3], ['E4',3], ['D4',4], ['E4',3], ['C4',10] ]
                        },
                        { tempo: 0.75, octaveShift: 0, waveform: 'sine', gain: 0.18,
                            notes: [ ['C4',5], ['F4',5], ['A4',5], ['D5',7], ['A4',5], ['G4',4], ['E4',4], ['D4',5], ['E4',3], ['C4',12] ]
                        },
                        { tempo: 0.65, octaveShift: -1, waveform: 'triangle', gain: 0.16,
                            notes: [ ['C4',6], ['F4',6], ['A4',6], ['D5',8], ['A4',6], ['G4',4], ['E4',4], ['D4',6], ['E4',4], ['C4',14] ]
                        }
                    ]
                },
                cradle: {
                    name: "紅花搖籃曲（我在安撫妳）",
                    variations: [
                        { tempo: 0.9, octaveShift: 0, waveform: 'triangle', gain: 0.22,
                            notes: [ ['C4',3], ['E4',3], ['C4',3], ['G4',3], ['C5',3], ['G4',3], ['A4',4], ['G4',3], ['E4',3], ['D4',4], ['E4',3], ['C4',12] ]
                        },
                        { tempo: 0.8, octaveShift: 0, waveform: 'sine', gain: 0.18,
                            notes: [ ['C4',4], ['E4',4], ['C4',4], ['G4',5], ['C5',5], ['G4',5], ['A4',5], ['G4',4], ['E4',4], ['D4',6], ['E4',3], ['C4',14] ]
                        },
                        { tempo: 0.65, octaveShift: -1, waveform: 'triangle', gain: 0.16,
                            notes: [ ['C4',5], ['E4',5], ['C4',5], ['G4',6], ['C5',6], ['G4',6], ['A4',7], ['G4',5], ['E4',5], ['D4',8], ['E4',4], ['C4',18] ]
                        }
                    ]
                },
                waltz: {
                    name: "失語者的華爾滋（我們什麼都沒說）",
                    variations: [
                        { tempo: 0.85, octaveShift: 0, waveform: 'triangle', gain: 0.25,
                            notes: [ ['C4',4], ['E4',3], ['G4',4], ['C5',7], ['A4',4], ['G4',3], ['E4',7], ['D4',4], ['E4',3], ['C4',12] ]
                        },
                        { tempo: 0.75, octaveShift: 0, waveform: 'sine', gain: 0.2,
                            notes: [ ['C4',5], ['E4',3], ['G4',5], ['C5',8], ['A4',5], ['G4',3], ['E4',8], ['D4',5], ['E4',3], ['C4',14] ]
                        },
                        { tempo: 0.6, octaveShift: -1, waveform: 'triangle', gain: 0.18,
                            notes: [ ['C4',6], ['E4',4], ['G4',6], ['C5',10], ['A4',6], ['G4',4], ['E4',10], ['D4',6], ['E4',4], ['C4',18] ]
                        }
                    ]
                }
            },

            // 播放一個音符（帶 ADSR 包絡與合音）
            playNote(freq, duration, waveform, gain, octaveShift = 0) {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                const actualFreq = freq * Math.pow(2, octaveShift);

                const osc = this.ctx.createOscillator();
                const noteGain = this.ctx.createGain();
                osc.type = waveform;
                osc.frequency.setValueAtTime(actualFreq, now);

                const osc2 = this.ctx.createOscillator();
                const noteGain2 = this.ctx.createGain();
                osc2.type = waveform === 'triangle' ? 'sine' : 'triangle';
                osc2.frequency.setValueAtTime(actualFreq * 1.5, now);

                noteGain.gain.setValueAtTime(0, now);
                noteGain.gain.linearRampToValueAtTime(gain, now + 0.03);
                noteGain.gain.linearRampToValueAtTime(gain * 0.8, now + duration - 0.05);
                noteGain.gain.linearRampToValueAtTime(0, now + duration);

                noteGain2.gain.setValueAtTime(0, now);
                noteGain2.gain.linearRampToValueAtTime(gain * 0.3, now + 0.02);
                noteGain2.gain.linearRampToValueAtTime(0, now + duration - 0.03);

                osc.connect(noteGain);
                osc2.connect(noteGain2);
                if (!this.masterGain) {
                    this.masterGain = this.ctx.createGain(); this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime); this.masterGain.connect(this.ctx.destination);
                }
                noteGain.connect(this.masterGain);
                noteGain2.connect(this.masterGain);

                osc.start(now);
                osc.stop(now + duration + 0.1);
                osc2.start(now);
                osc2.stop(now + duration + 0.1);
            },

            // 播放整段旋律
            playSequence(variationData) {
                if (!this.ctx) return;
                const notes = variationData.notes;
                const tempo = variationData.tempo;
                const waveform = variationData.waveform;
                const gain = variationData.gain;
                const octaveShift = variationData.octaveShift || 0;
                let time = 0;

                // clear any pending timers from previous sequences
                this.clearAllTimers();
                this.stop();
                // 音量淡入：確保 masterGain 存在並從 0 淡入到 baseVolume
                if (!this.masterGain && this.ctx) { this.masterGain = this.ctx.createGain(); this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime); this.masterGain.connect(this.ctx.destination); }
                if (this.masterGain && this.ctx) {
                    const now = this.ctx.currentTime;
                    try { this.masterGain.gain.cancelScheduledValues(now); } catch(e){}
                    this.masterGain.gain.setValueAtTime(0, now);
                    this.masterGain.gain.linearRampToValueAtTime(this.baseVolume, now + 3.0);
                }
                this.isPlaying = true;

                const playNext = () => {
                    if (!this.isPlaying) return;
                    if (this.notes.length === 0) {
                        this.notes = notes.slice();
                        time = 0;
                    }
                    const [note, dur] = this.notes.shift();
                    const freq = this.freq[note];
                    const duration = (dur / tempo) * 0.5; // 每單位 0.5 秒
                    this.playNote(freq, duration, waveform, gain, octaveShift);
                    // ensure any previous timer is cleared before scheduling next to avoid races
                    if (this.timer) { clearTimeout(this.timer); this.timer = null; }
                    const t = setTimeout(playNext, duration * 1000);
                    this.pendingTimers.push(t);
                    this.timer = t;
                };

                this.notes = notes.slice();
                playNext();
            },

            // 開始播放指定曲目與變體
            play(trackKey, variationIndex = 0) {
                if (!this.ctx) this.ctx = AudioEngine.ctx;
                if (!this.ctx) return;
                if (!this.masterGain) {
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.setValueAtTime(0, this.ctx.currentTime);
                    this.masterGain.connect(this.ctx.destination);
                }
                const track = this.tracks[trackKey];
                if (!track) return;
                const variation = track.variations[variationIndex] || track.variations[0];
                this.currentTrack = trackKey;
                this.currentVariation = variationIndex;
                this.playSequence(variation);
            },

            stop() {
                this.isPlaying = false;
                this.clearAllTimers();
                this.notes = [];
            },

            switchVariation(variationIndex) {
                if (this.currentTrack) {
                    this.clearAllTimers();
                    this.play(this.currentTrack, variationIndex);
                }
            }
            ,
            clearAllTimers() {
                try {
                    if (this.pendingTimers && this.pendingTimers.length) {
                        this.pendingTimers.forEach(t => clearTimeout(t));
                        this.pendingTimers = [];
                    }
                    if (this.timer) { clearTimeout(this.timer); this.timer = null; }
                } catch (e) {}
            }
        };

        // 遊戲狀態對應音樂變換的輔助函數
        function updateMusicForState() {
            if (!MusicEngine) return;
            // 如果 AudioContext 尚未啟動，嘗試使用 AudioEngine.ctx
            if (!MusicEngine.ctx && typeof AudioEngine !== 'undefined') MusicEngine.ctx = AudioEngine.ctx;
            if (!MusicEngine.ctx) return;

            if (gameState === 'ENDING') {
                // 結局：若 reconciliation 且全碎片，播放母題（僅此一次）
                if (typeof acceptance !== 'undefined' && acceptance >= 70 && playerCognition.collectedPoemFragments.size >= 26) {
                    if (!MusicEngine.playedPrime) { MusicEngine.play('prime', 0); MusicEngine.playedPrime = true; }
                } else {
                    MusicEngine.play('waltz', 2);
                }
            } else if (gameState === 'COLLAPSE' || (typeof isCollapsing !== 'undefined' && isCollapsing)) {
                // 切換到夜晚變體 (index 2)
                if (MusicEngine.currentTrack) MusicEngine.switchVariation(2);
            } else if (dreamPhase) {
                MusicEngine.play('cradle', 2);
            } else if (typeof hasAnyReckoningOccurred !== 'undefined' && hasAnyReckoningOccurred) {
                // 被打臉過 → 失語者的華爾滋（懸置、無解）
                MusicEngine.play('waltz', 0);
            } else if (playerCognition.activeDelusions && playerCognition.activeDelusions.length > 0) {
                // 正在誤解中 → 搖籃曲（自我欺騙的安撫）
                MusicEngine.play('cradle', 0);
            } else if (typeof acceptance !== 'undefined' && acceptance > 70) {
                MusicEngine.play('an', 1);
            } else if (typeof acceptance !== 'undefined' && acceptance < 40) {
                MusicEngine.play('waltz', 1);
            } else {
                MusicEngine.play('an', 0);
            }
        }

        const playerCognition = {
            discoveredFragments: {}, completedCombos: new Set(), collectedPoemFragments: new Set(),
            fakeRewardCooldown: false, trustLevel: 1.0, memoryDecayCounter: 0, activeDelusions: []
        };

        // --- 情感核心系統（新增全域變數）
        // 情感核心數值（隱藏，不顯示 UI）
        let acceptance = 50; // 0~100，起始中立，>70 偏向接受，<40 偏向封閉
        // 供視覺化用的平滑相位狀態（避免直接使用高頻隨機導致眼睛不適）
        let acceptanceAnim = { phase: 0 };

        // 線索鎖死記錄：當玩家過度咳血在誤解物件上，永久禁止該線索的正確版本
        const lockedClues = new Set();

        // 矛盾狀態計數：用於觸發特別事件
        let contradictionLevel = 0;

        // 連續咳血計數（用於冷靜期）
        let consecutiveCough = 0;

        function registerSolidCollider(sizeX, sizeZ, centerX, centerZ, id, padding = 0.0) {
            solidColliders.push({
                id,
                minX: centerX - sizeX / 2 - padding,
                maxX: centerX + sizeX / 2 + padding,
                minZ: centerZ - sizeZ / 2 - padding,
                maxZ: centerZ + sizeZ / 2 + padding
            });
        }

        function isPositionBlocked(x, z) {
            for (const c of solidColliders) {
                if (
                    x > c.minX - PLAYER_COLLIDER_RADIUS &&
                    x < c.maxX + PLAYER_COLLIDER_RADIUS &&
                    z > c.minZ - PLAYER_COLLIDER_RADIUS &&
                    z < c.maxZ + PLAYER_COLLIDER_RADIUS
                ) return true;
            }
            return false;
        }

        function resolvePlayerColliderOverlap() {
            if (!camera) return;
            const maxIterations = 5;
            const bound = 18;
            let x = camera.position.x;
            let z = camera.position.z;

            for (let pass = 0; pass < maxIterations; pass++) {
                let hasOverlap = false;

                for (const c of solidColliders) {
                    const minX = c.minX - PLAYER_COLLIDER_RADIUS;
                    const maxX = c.maxX + PLAYER_COLLIDER_RADIUS;
                    const minZ = c.minZ - PLAYER_COLLIDER_RADIUS;
                    const maxZ = c.maxZ + PLAYER_COLLIDER_RADIUS;

                    if (x > minX && x < maxX && z > minZ && z < maxZ) {
                        // find smallest push distance
                        const dists = [
                            { v: 'left',  d: x - minX },
                            { v: 'right', d: maxX - x },
                            { v: 'back',  d: z - minZ },
                            { v: 'front', d: maxZ - z }
                        ];
                        dists.sort((a,b) => a.d - b.d);
                        const closest = dists[0];
                        const eps = 0.03;
                        if (closest.v === 'left') x = minX - eps;
                        else if (closest.v === 'right') x = maxX + eps;
                        else if (closest.v === 'back') z = minZ - eps;
                        else z = maxZ + eps;
                        hasOverlap = true;
                    }
                }

                if (!hasOverlap) break;
            }

            camera.position.x = Math.max(-bound, Math.min(bound, x));
            camera.position.z = Math.max(-bound, Math.min(bound, z));
        }

            // 預先建立一個透明平面作為鏡中圖像承載，texture 載入後會替換材質 map
            mirrorPlane = new THREE.Mesh(new THREE.PlaneGeometry(5.6, 14.6), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.16, depthWrite: false, side: THREE.DoubleSide }));
            mirrorPlane.position.set(-19.85, -2.5, 0);
            mirrorPlane.rotation.y = -Math.PI / 2; // 面向室內 (X 正向)
            mirrorPlane.visible = false;
            scene.add(mirrorPlane);

            // 以 TextureLoader 載入鏡中影像（檔案：images/mirror_figure.png）
            const applyMirrorFallbackTexture = (message) => {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#080808';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 8;
                ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '42px serif';
                ctx.textAlign = 'center';
                ctx.fillText(message, canvas.width / 2, canvas.height / 2);
                const fallbackTexture = new THREE.CanvasTexture(canvas);
                fallbackTexture.minFilter = THREE.LinearFilter;
                fallbackTexture.magFilter = THREE.LinearFilter;
                mirrorPlane.material.map = fallbackTexture;
                mirrorPlane.material.opacity = 0.16;
                mirrorPlane.material.depthWrite = false;
                mirrorPlane.material.needsUpdate = true;
                mirrorPlaneMat = mirrorPlane.material;
            };

            if (window.location.protocol === 'file:') {
                console.warn('file:// 模式會被瀏覽器阻擋貼圖（CORS）。請改用本機 http 伺服器開啟。');
                applyMirrorFallbackTexture('請用本機伺服器啟動');
            } else {
                // 以兩張貼圖（normal / cry）載入鏡中影像
                const loadMirrorTexture = (url, key, fallbackMsg) => {
                    const loader = new THREE.TextureLoader();
                    loader.load(url, (texture) => {
                        texture.minFilter = THREE.LinearFilter;
                        texture.magFilter = THREE.LinearFilter;
                        mirrorTextures[key] = texture;
                        // 當兩張都載入完畢，先顯示 normal
                        if (mirrorTextures.normal && mirrorTextures.cry) {
                            mirrorPlane.material.map = mirrorTextures.normal;
                            mirrorPlane.material.opacity = 0.16;
                            mirrorPlane.material.depthWrite = false;
                            mirrorPlane.material.needsUpdate = true;
                            mirrorPlane.material.color = new THREE.Color(0x888888);
                            mirrorPlaneMat = mirrorPlane.material;
                            if (mirrorPlane && mirrorPlane.scale.x !== 1) mirrorPlane.scale.x = 1;
                        }
                    }, undefined, () => {
                        console.warn(`鏡中影像載入失敗：${url}`);
                        if (!mirrorTextures[key]) applyMirrorFallbackTexture(fallbackMsg);
                    });
                };

                loadMirrorTexture('images/mirror_figure.png', 'normal', '請用本機伺服器啟動');
                loadMirrorTexture('images/mirror_figure_cry.png', 'cry', '哭泣影像載入失敗');
            }

            // 建立互動用 hitbox（使用鏡框位置）
            interactableProps['mirror'] = { mesh: mirrorPlane, hb: makePropHitbox(2, 12, 6, mirrorFrame, 'mirror') };

            const calendar = addBox(1.5, 1.5, 0.2, -12, -4.5, -16, baseMat);
            interactableProps['calendar'] = { mesh: calendar, hb: makePropHitbox(3,3,3, calendar, 'calendar') };

            const wallText = addBox(4, 2, 0.1, 0, 2, -19.5, dimMat); wallText.visible = false;
            interactableProps['wall'] = { mesh: wallText, hb: makePropHitbox(6,4,2, wallText, 'wall') };
            
            interactableProps['flower'] = { hb: interactableProps['vase'].hb };

            // 實際阻擋：避免角色直接穿過家具
            registerSolidCollider(10, 16, 15, -10, 'bed', 0.5);
            registerSolidCollider(10, 5, -14, -15, 'desk', 0.5);
            registerSolidCollider(3.6, 3.6, -10, -12, 'chair', 0.45);
            registerSolidCollider(4.2, 4.2, 15, -1.5, 'cabinet', 0.3);

            const shadowGeo = new THREE.EdgesGeometry(new THREE.CircleGeometry(2, 8));
            playerShadow = new THREE.LineSegments(shadowGeo, new THREE.LineBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.15}));
            playerShadow.rotation.x = -Math.PI / 2; playerShadow.position.y = -9.9;

            // --- 地板線條（木地板拼縫） ---
            const floorLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 });
            for (let i = -18; i <= 18; i += 2) {
                const pts = [new THREE.Vector3(i, -9.9, -19.8), new THREE.Vector3(i, -9.9, 19.8)];
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), floorLineMat);
                scene.add(line); roomLines.push(line); roomOrigVerts.push(Array.from(line.geometry.attributes.position.array));
            }

            // --- 天花板暗示線（四邊的裝飾線腳） ---
            const ceilingLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 });
            // 四條天花板邊緣線
            const corners = [
                [ -19.8, -19.8 ], [ 19.8, -19.8 ], [ -19.8, 19.8 ], [ 19.8, 19.8 ]
            ];
            // horizontal front/back
            const front = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-19.8, 9.8, -19.8), new THREE.Vector3(19.8, 9.8, -19.8)]), ceilingLineMat);
            const back = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-19.8, 9.8, 19.8), new THREE.Vector3(19.8, 9.8, 19.8)]), ceilingLineMat);
            scene.add(front); roomLines.push(front); roomOrigVerts.push(Array.from(front.geometry.attributes.position.array));
            scene.add(back); roomLines.push(back); roomOrigVerts.push(Array.from(back.geometry.attributes.position.array));
            // vertical left/right
            const left = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-19.8, 9.8, -19.8), new THREE.Vector3(-19.8, 9.8, 19.8)]), ceilingLineMat);
            const right = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(19.8, 9.8, -19.8), new THREE.Vector3(19.8, 9.8, 19.8)]), ceilingLineMat);
            scene.add(left); roomLines.push(left); roomOrigVerts.push(Array.from(left.geometry.attributes.position.array));
            scene.add(right); roomLines.push(right); roomOrigVerts.push(Array.from(right.geometry.attributes.position.array));

            // --- 床頭板與床單褶皺 ---
            const headboardMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
            for (let i = -3; i <= 3; i += 1.5) {
                const pts = [new THREE.Vector3(11 + i, -9.9, -2), new THREE.Vector3(11 + i, -5, -2)];
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), headboardMat);
                scene.add(line); roomLines.push(line); roomOrigVerts.push(Array.from(line.geometry.attributes.position.array));
            }
            // 床單褶皺（床面上的微弧線）
            for (let i = 0; i < 3; i++) {
                const arcPoints = [];
                for (let j = 0; j <= 10; j++) {
                    const t = j / 10;
                    arcPoints.push(new THREE.Vector3(
                        11 + (Math.random() - 0.5) * 0.5,
                        -6.5 + Math.sin(t * Math.PI) * 0.3,
                        -10 + t * 8
                    ));
                }
                const arcLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(arcPoints), 
                    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 }));
                scene.add(arcLine); roomLines.push(arcLine); roomOrigVerts.push(Array.from(arcLine.geometry.attributes.position.array));
            }

            scene.add(playerShadow);

            ribsGroup = new THREE.Group();
            for(let i=0; i<4; i++) {
                const curve = new THREE.EllipseCurve(0, -i*0.4, 1.5, 1+i*0.2, 0, Math.PI, false, 0);
                const points = curve.getPoints(15);
                ribsGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({color: 0xffffff, transparent:true, opacity:0.6})));
            }
            ribsGroup.position.set(0, -0.5, -2); ribsGroup.rotation.x = Math.PI/2; ribsGroup.visible = false;
            camera.add(ribsGroup); scene.add(camera);
        }

        let typeReadInt;
        function checkInteractions(dt) {
            if (gameState !== 'AWAKE') return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects([bedHitbox, letterHitbox, windowHitbox, doorHitbox, ...Object.values(interactableProps).map(p=>p.hb)]);
            
            const hint = document.getElementById('interaction-hint'), prog = document.getElementById('gaze-progress'), ret = document.getElementById('reticle'), infText = document.getElementById('inference-text');
            currentGazedObject = null;

            if (hits.length > 0) {
                const target = hits[0].object.userData.id;
                currentGazedObject = target;
                ret.style.transform = 'translate(-50%, -50%) scale(1.5)'; ret.style.backgroundColor = '#fff';
                if (currentDailyTask && !currentDailyTask.completed && target === currentDailyTask.target) {
                    hint.innerText = `按 E：${currentDailyTask.actionText}`;
                    hint.style.opacity = '1';
                }

                if (target === 'letter') {
                    letterReadTimer += dt;
                    hint.innerText = currentDay<=letterInstances.length ? "凝視閱讀信件" : "（沒有新信件）"; hint.style.opacity = '1';
                    prog.style.opacity = '1'; prog.style.borderColor = 'transparent'; prog.style.borderTopColor = '#fff';
                    prog.style.transform = `translate(-50%, -50%) rotate(${(letterReadTimer/1.5)*360}deg)`;
                    if (letterReadTimer >= 1.5 && currentDay<=letterInstances.length) { openLetter(currentDay); letterReadTimer=0; prog.style.opacity='0'; }
                } 
                else if (target === 'bed') {
                    gazeTimer += dt; if(gazeTimer===dt) AudioEngine.startHeartbeat(0.3);
                    hint.innerText = (currentDailyTask && !currentDailyTask.completed) ? "先完成今日任務，再睡覺" : "凝視入睡";
                    hint.style.opacity = '1';
                    prog.style.opacity = '1'; prog.style.borderColor = 'transparent'; prog.style.borderTopColor = '#f00';
                    prog.style.transform = `translate(-50%, -50%) rotate(${(gazeTimer/2.0)*360}deg)`;
                    if (gazeTimer >= 2.0) {
                        if (currentDailyTask && !currentDailyTask.completed) {
                            gazeTimer = 0;
                            AudioEngine.stopHeartbeat();
                            showEphemeralText('今日小任務尚未完成。');
                        } else {
                            AudioEngine.stopHeartbeat(); startSleepSequence();
                        }
                    }
                }
                else if (target === 'window') {
                    gazeTimer += dt;
                    if(gazeTimer > 3.0 && windowGazeCount < currentDay) { windowGazeCount++; gazeTimer = -5; unlockPoemFragment('P20'); }
                }
                else if (target === 'door') {
                    gazeTimer += dt;
                    if(currentDay >= 3) {
                        infText.innerText = (currentDay > 3) ? "上次它以為妳要出去。下次它會鎖更緊。" : "門是鎖著的。妳從來沒有鑰匙。"; 
                        infText.style.opacity = '1';
                        if(gazeTimer > 2.0) { doorGazeCount++; gazeTimer = -5; if(doorGazeCount>2) unlockPoemFragment('P11'); }
                    }
                }
                else {
                    // 鏡子凝視顯示處理（模糊→對焦）與雙圖切換
                    if (target === 'mirror') {
                        // 依據線索進度切換鏡中影像（背影 -> 哭泣）
                        const mirrorClue = (typeof emotionalClues !== 'undefined') ? emotionalClues['mirror'] : null;
                        if (mirrorClue && mirrorClue.currentFragment >= (mirrorClue.fragments ? mirrorClue.fragments.length : 0)) {
                            // 已解完所有片段：顯示哭泣圖
                            if (mirrorPlaneMat && mirrorTextures.cry && mirrorPlaneMat.map !== mirrorTextures.cry) {
                                mirrorPlaneMat.map = mirrorTextures.cry;
                                mirrorPlaneMat.needsUpdate = true;
                            }
                        } else {
                            // 未解完：顯示背影圖
                            if (mirrorPlaneMat && mirrorTextures.normal && mirrorPlaneMat.map !== mirrorTextures.normal) {
                                mirrorPlaneMat.map = mirrorTextures.normal;
                                mirrorPlaneMat.needsUpdate = true;
                            }
                        }

                        mirrorGazeTimer += dt;
                        if (mirrorPlaneMat) {
                            // 移除對 Mesh 使用 CSS filter（無效），改以更長的淡入模擬朦朧
                            const fadeProgress = Math.min(1.0, mirrorGazeTimer * MIRROR_FADE_SPEED * 0.6);
                            mirrorPlaneMat.opacity = 0.16 + fadeProgress * 0.69;
                        }
                    } else {
                        mirrorGazeTimer = 0;
                        if (mirrorPlaneMat) {
                            mirrorPlaneMat.opacity = (interactableProps['mirror']?.mesh?.visible ? 0.16 : 0.0);
                        }
                    }

                    let clue = emotionalClues[target];
                    if (clue && currentDay >= clue.day) {
                        // 如果此線索被鎖死，顯示被拒絕訊息
                        if (lockedClues.has(target)) {
                            infText.innerText = "妳拒絕了這個線索。";
                            infText.style.opacity = '1'; infText.style.color = '#aa4444';
                        } else {
                            // 矛盾觸發：在第三天後，接受度中間區間有機率造成矛盾
                            if (currentDay >= 3 && acceptance >= 40 && acceptance <= 60 && !clue.isContradicting && Math.random() < contradictionProbability) {
                                clue.isContradicting = true; clue.contradictTimer = 3.0; contradictionLevel++;
                            }

                            // 處理檢視進度
                            if (clue.isContradicting) {
                                // 在矛盾狀態下閃爍顯示片段，且不推進進度
                                clue.contradictTimer -= dt;
                                const a = Math.floor((clue.contradictTimer * 3) % 2);
                                const alt = clue.fragments[(clue.currentFragment) % clue.fragments.length].text;
                                const alt2 = clue.fragments[Math.max(0, clue.currentFragment-1) % clue.fragments.length].text || alt;
                                infText.innerText = a === 0 ? alt : alt2;
                                infText.style.opacity = '1'; infText.style.color = '#ff4444';
                                if (clue.contradictTimer <= 0) { clue.isContradicting = false; }
                            } else {
                                // 根據是否激活誤解，選擇不同的 fragments 陣列
                                let activeFragments = clue.isActive ? (clue.delusionFragments || clue.fragments) : clue.fragments;
                                let activeIndex = clue.isActive ? (clue.delusionIndex || 0) : clue.currentFragment;
                                
                                clue.inspectProgress += dt;
                                if (clue.inspectProgress >= clue.THRESH && activeIndex < activeFragments.length) {
                                    clue.inspectProgress = 0;
                                    const frag = activeFragments[activeIndex];
                                    infText.innerText = frag.text;
                                    
                                    if (frag.tag === 'care') acceptance = Math.min(100, acceptance + 1);
                                    else if (frag.tag === 'distance' || frag.tag === 'neglect') acceptance = Math.max(0, acceptance - 1);
                                    
                                    if (clue.isActive) {
                                        clue.delusionIndex = (clue.delusionIndex || 0) + 1;
                                        if (clue.delusionIndex >= activeFragments.length && clue.target === 'mirror') unlockPoemFragment('P15');
                                    } else {
                                        clue.currentFragment++;
                                        if (clue.currentFragment >= clue.fragments.length && clue.target === 'vase') unlockPoemFragment('P01');
                                        if (clue.currentFragment >= clue.fragments.length && clue.target === 'calendar') unlockPoemFragment('P07');
                                    }
                                } else {
                                    if (activeIndex > 0) infText.innerText = activeFragments[activeIndex - 1].text;
                                    else infText.innerText = "？";
                                }
                                
                                if (activeIndex >= activeFragments.length && clue.inspectProgress > 5.0) {
                                    acceptance = Math.min(100, acceptance + 0.5 * dt);
                                    if (!clue._gaveGazeFeedback) {
                                        clue._gaveGazeFeedback = true;
                                        // 顯示最後一段作為微弱回饋，並短暫發光
                                        const lastText = (activeFragments && activeFragments.length) ? activeFragments[activeFragments.length-1].text : '';
                                        infText.innerText = lastText || infText.innerText;
                                        const r = 255;
                                        const g = Math.round(100 + (acceptance / 100) * 155);
                                        const b = Math.round(100 + (acceptance / 100) * 155);
                                        infText.style.color = clue.isActive ? '#ff6666' : '#ffdedd';
                                        infText.style.textShadow = `0 0 12px rgba(${r},${g},${b},0.6)`;
                                        if (typeof AudioEngine !== 'undefined' && AudioEngine.playBreath) AudioEngine.playBreath();
                                        setTimeout(() => { clue._gaveGazeFeedback = false; infText.style.textShadow = ''; }, 3000);
                                    }
                                }
                                
                                infText.style.opacity = '1';
                                infText.style.color = clue.isActive ? '#ff4444' : 'rgba(200, 50, 50, 0.9)';
                            }
                        }
                    }
                }
            } else {
                gazeTimer = 0; letterReadTimer = 0; AudioEngine.stopHeartbeat();
                if(Object.values(emotionalClues).some(o => o.inspectProgress > 0)) Object.values(emotionalClues).forEach(o => o.inspectProgress = 0);
                hint.style.opacity = '0'; prog.style.opacity = '0'; infText.style.opacity = '0';
                ret.style.transform = 'translate(-50%, -50%) scale(1)'; ret.style.backgroundColor = 'rgba(255,255,255,0.5)';
            }
        }

        // NOTE: old "fake clue" / uncertainty mechanics replaced by emotionalClues + contradiction system.

        let fullLetterContentToType = "";
        let currentReadingDay = 0;
        let lastLetterChanged = false; // 新增：用於記錄錯亂提示

        function openLetter(day) {
            releasePointerLockForUI();
            gameState = 'READING'; AudioEngine.playPaper(); currentReadingDay = day;
            const sc = document.getElementById('letter-reading-screen'), txtEl = document.getElementById('letter-reading-text');
            txtEl.innerText = ""; sc.style.display = 'flex'; setTimeout(() => sc.style.opacity = '1', 50);
            
            // 若當日有矛盾的線索，顯示短暫閃爍提示
            let activeContradiction = Object.values(emotionalClues).find(c => c.isContradicting && c.day === currentDay);
            if (activeContradiction) showEphemeralText('（記憶閃爍…）');

            // 檢查是否有被激活的誤解（需要先觸發打臉）
            let activeOdd = Object.values(emotionalClues).find(c => c.isActive && c.day === currentDay);
            if (activeOdd) { triggerUncertainty(activeOdd); }

            const letter = letterInstances[day-1];
            const state = { activeDelusions: playerCognition.activeDelusions, hasAnyReckoningOccurred, acceptance, currentDay, trustLevel: playerCognition.trustLevel, memoryDecayCounter: playerCognition.memoryDecayCounter };
            const segs = letter.getCurrentSegments(state);
            
            lastLetterChanged = false;
            if (letter.lastReadSnapshot && JSON.stringify(segs) !== JSON.stringify(letter.lastReadSnapshot)) {
                lastLetterChanged = true;
                AudioEngine.playTapeWobble(); 
                document.getElementById('canvas-container').classList.add('ghost-room-effect');
                setTimeout(() => document.getElementById('canvas-container').classList.remove('ghost-room-effect'), 500);
                if(day===4) unlockPoemFragment('P16');
            }
            letter.lastReadSnapshot = segs; letter.readCount++;

            let fullText = (segs[0] && segs[0].senderOverride) ? `${segs[0].senderOverride}：\n` : (letter.template.sender ? `${letter.template.sender}：\n` : "");
            segs.forEach(s => fullText += s.text + "\n");
            fullLetterContentToType = fullText;

            let charIdx = 0;
            typeReadInt = setInterval(() => {
                if(charIdx < fullLetterContentToType.length) txtEl.innerText += fullLetterContentToType[charIdx++];
                else { 
                    clearInterval(typeReadInt); typeReadInt = null;
                    document.getElementById('letter-close-hint').style.opacity = '1'; 
                    if(day===1) unlockPoemFragment('P02'); if(day===3 && fullLetterContentToType.includes('如果她說')) unlockPoemFragment('P06'); if(day===7) unlockPoemFragment('P19');
                }
            }, 50);
        }

        function closeLetter() {
            if(gameState !== 'READING') return; 
            
            if(typeReadInt) {
                clearInterval(typeReadInt); typeReadInt = null;
                document.getElementById('letter-reading-text').innerText = fullLetterContentToType;
                document.getElementById('letter-close-hint').style.opacity = '1';
                
                if(currentReadingDay===1) unlockPoemFragment('P02'); 
                if(currentReadingDay===3 && fullLetterContentToType.includes('如果她說')) unlockPoemFragment('P06'); 
                if(currentReadingDay===7) unlockPoemFragment('P19');
                return; 
            }

            const sc = document.getElementById('letter-reading-screen'); sc.style.opacity = '0'; document.getElementById('letter-close-hint').style.opacity = '0'; AudioEngine.playPaper();
            setTimeout(() => { 
                sc.style.display = 'none'; gameState = 'AWAKE'; updateMusicForState();
                // 新增：信件關閉後，若內容改變，顯示錯亂提示
                if(lastLetterChanged) setTimeout(() => showEphemeralText("（信好像和上次讀的不一樣。）"), 500);
            }, 1000);
        }

        let activeBlood = [];
        function triggerCough() {
            if (gameState === 'COLLAPSE') {
                    AudioEngine.playChoke(); requestShake(0.5);
                document.getElementById('vignette').style.background = 'rgba(255,0,0,0.5)'; setTimeout(()=>document.getElementById('vignette').style.background = '', 200);
                return;
            }
            if (gameState !== 'AWAKE') return;

            // 冷靜期檢查：若還在鎖定時間內，只發出窒塞聲並退出
            const now = Date.now();
            if (now < coughLockedUntil) {
                AudioEngine.playChoke();
                return;
            }

            // 若距離上次咳嗽超過 2 秒，重置連續計數
            if (lastCoughTime && (now - lastCoughTime) > 2000) {
                consecutiveCough = 0;
            }

            // 計數連續咳嗽
            consecutiveCough++;
            lastCoughTime = now;

            if (consecutiveCough >= 3) {
                // 鎖住 20 秒，並提供 UI 回饋與按鈕禁用
                coughLockedUntil = now + 20000;
                consecutiveCough = 0;
                showEphemeralText("喉嚨...太痛了...等一會");
                const btn = document.getElementById('cough-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.style.color = '#666';
                    btn.style.borderColor = '#666';
                }
                AudioEngine.playChoke();
                setTimeout(() => {
                    if (btn) {
                        btn.disabled = false;
                        btn.style.color = 'rgba(255, 255, 255, 0.7)';
                        btn.style.borderColor = 'rgba(255, 255, 255, 0.4)';
                    }
                }, 20000);
                return;
            }

            requestShake(1.2); coughCountToday++; totalCoughCount++; weaknessTimer = 5.0; AudioEngine.playScrape();
            // 顯示咳嗽後的右下內心字幕
            try { showCoughSubtitleOnce(); } catch (e) {}
            if(totalCoughCount===1) unlockPoemFragment('P03');
            if(totalCoughCount>5) unlockPoemFragment('P09');
            
            if (hasAnyReckoningOccurred) coughedAfterReckoning = true; 

            roomLines.forEach(l => { if(l) l.material.opacity = 0.05; });
            ribsGroup.visible = true; playerShadow.material.opacity = 0.8;
            setTimeout(() => { 
                roomLines.forEach(l => { if(l) l.material.opacity = 0.3; }); 
                ribsGroup.visible = false; playerShadow.material.opacity = 0.15 + (currentDay * 0.05);
            }, 300);

        function createBloodStroke(pos, isConcentrated, isWall = false) {

            }
            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), strokeMat.clone());
            scene.add(line); bloodStrokes.push(line);
        }

            const spawnPos = camera.position.clone().add(dir.multiplyScalar(2)); spawnPos.y -= 1.0;
            const count = 40;
            const posArr = new Float32Array(count * 3), vels = [];
            for (let i = 0; i < count; i++) {
                posArr[i*3] = spawnPos.x; posArr[i*3+1] = spawnPos.y; posArr[i*3+2] = spawnPos.z;
                vels.push(new THREE.Vector3((Math.random()-0.5)*0.6 + dir.x*0.4, (Math.random()*0.3) + 0.02, (Math.random()-0.5)*0.6 + dir.z*0.4));

            finalBloodParticles.push({ mesh: pSys, vels: vels, life: 180 });
        }

        // Spawn a floral bloom made of many thin line-petals that expand then gently fall.
        function spawnFinalBloom() {
            if (!scene || !camera) return;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            const spawnPos = camera.position.clone().add(dir.clone().multiplyScalar(2)); spawnPos.y -= 0.6;
            const nPetals = 50; const arcs = 5; const segs = 8;
            for (let i = 0; i < nPetals; i++) {
                const baseAngle = (i % arcs) * (Math.PI * 2 / arcs);
                const theta = baseAngle + (Math.random() - 0.5) * 0.4;
                const length = 1.2 + Math.random() * 1.6;
                const amp = 0.25 + Math.random() * 0.6;
                const posArr = new Float32Array(segs * 3);
                for (let j = 0; j < segs; j++) { posArr[j*3] = spawnPos.x; posArr[j*3+1] = spawnPos.y; posArr[j*3+2] = spawnPos.z; }
                const geo = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                const mat = new THREE.LineBasicMaterial({ color: 0x600000, transparent: true, opacity: 1.0 });
                const line = new THREE.Line(geo, mat); scene.add(line);
                finalBloomParticles.push({ mesh: line, theta: theta, length: length, amp: amp, segs: segs, elapsed: 0, dropOffset: 0, vy: -0.0, spawnPos: spawnPos.clone(), life: 8.0 });
            }
        }

            }
            if (AudioEngine.heartbeatGain && AudioEngine.ctx) {
